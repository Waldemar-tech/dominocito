# Dominócito — nginx config
# Server: 10.101.20.3
# Cloudflared envía tráfico a localhost:80 → nginx → frontend estático + /api/ → backend

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name dominocito.com www.dominocito.com _;

    # Logs
    access_log /var/log/nginx/dominocito.access.log;
    error_log /var/log/nginx/dominocito.error.log;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Ocultar nginx version
    server_tokens off;

    # Max upload size (para futuras imágenes)
    client_max_body_size 10M;

    # Frontend estático
    root /var/www/dominocito-front;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache assets estáticos
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Backend API proxy
    location /api/ {
        proxy_pass http://localhost:3200/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_read_timeout 30s;
        proxy_connect_timeout 10s;
    }

    # Health check interno (no expuesto)
    location /health {
        proxy_pass http://localhost:3200/health;
        access_log off;
    }
}
